version: '3.8'

# ================================================
# SCHEDULE PRO - DOCKER COMPOSE
# Complete application stack with all services
# ================================================

services:
  # ================================================
  # 1. POSTGRESQL DATABASE
  # ================================================
  postgres:
    image: postgres:14-alpine
    container_name: schedulepro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ScheduleProDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: project123
      # Enable logging for debugging
      POSTGRES_LOG_STATEMENT: all
    ports:
      - "5433:5432"  # Host port 5433 -> Container port 5432
    volumes:
      # Persistent data storage
      - postgres_data:/var/lib/postgresql/data
      # Auto-run initialization scripts
      - ./backend/schedulepro-backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ScheduleProDB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - schedulepro-network

  # ================================================
  # 2. BACKEND - SPRING BOOT APPLICATION
  # ================================================
  backend:
    build:
      context: ./backend/schedulepro-backend
      dockerfile: Dockerfile
    container_name: schedulepro-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # ==========================================
      # SPRING PROFILE - Activates Docker config
      # ==========================================
      SPRING_PROFILES_ACTIVE: docker
      
      # ==========================================
      # DATABASE CONNECTION
      # ==========================================
      # 'postgres' is the Docker service name
      DB_URL: jdbc:postgresql://postgres:5432/ScheduleProDB
      DB_USERNAME: postgres
      DB_PASSWORD: project123
      
      # ==========================================
      # JWT SECURITY
      # ==========================================
      JWT_SECRET: scheduleProSecretKey2024MustBe32CharsLongAndSecure!!!
      JWT_EXPIRATION_MS: 86400000
      JWT_REFRESH_EXPIRATION_MS: 604800000
      
      # ==========================================
      # EMAIL CONFIGURATION
      # ==========================================
      MAIL_HOST: smtp.mailtrap.io
      MAIL_PORT: 2525
      MAIL_USERNAME: sweetdemo93@gmail.com
      MAIL_PASSWORD: qwemkuwehmqjgfls
      
      # ==========================================
      # GOOGLE OAUTH2
      # ==========================================
      GOOGLE_CLIENT_ID: 157330384875-cjedpfpffmnb0nisf5l6d8809sg31hlm.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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
      
      # ==========================================
      # CORS - Allow frontend access
      # ==========================================
      CORS_ORIGINS: http://localhost:3000,http://localhost,http://frontend
      
      # ==========================================
      # APPLICATION URLS
      # ==========================================
      BASE_URL: http://localhost:8080
      FILE_UPLOAD_DIR: /app/uploads
      
      # ==========================================
      # JAVA MEMORY OPTIONS
      # ==========================================
      JAVA_OPTS: -Xmx512m -Xms256m -XX:+UseG1GC
      
      # ==========================================
      # LOGGING LEVELS
      # ==========================================
      LOG_LEVEL_COM: INFO
      LOG_LEVEL_SECURITY: INFO
      LOG_LEVEL_HIBERNATE: INFO
      
      # ==========================================
      # DDL AUTO (Auto-create tables)
      # ==========================================
      DDL_AUTO: update
      SHOW_SQL: "false"
    ports:
      - "8080:8080"   # Main API
      - "5005:5005"   # Debug port (optional)
    volumes:
      # Persistent uploads
      - backend_uploads:/app/uploads
      # Mount config for development (optional)
      - ./backend/schedulepro-backend/src/main/resources/application-docker.yml:/app/config/application-docker.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - schedulepro-network

  # ================================================
  # 3. FRONTEND - REACT APPLICATION
  # ================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: schedulepro-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS (if SSL configured)
    environment:
      # React environment variables (build-time)
      REACT_APP_API_URL: http://localhost:8080/api
      REACT_APP_WS_URL: ws://localhost:8080/ws
    networks:
      - schedulepro-network

  # ================================================
  # 4. ADMINER - DATABASE MANAGEMENT (OPTIONAL)
  # ================================================
  adminer:
    image: adminer:latest
    container_name: schedulepro-adminer
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB: ScheduleProDB
      ADMINER_DEFAULT_USER: postgres
      ADMINER_DEFAULT_PASSWORD: project123
    networks:
      - schedulepro-network
    profiles:
      - admin
      - full

  # ================================================
  # 5. REDIS - CACHING (OPTIONAL - FUTURE USE)
  # ================================================
  redis:
    image: redis:7-alpine
    container_name: schedulepro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - schedulepro-network
    profiles:
      - full

# ================================================
# NETWORKS
# ================================================
networks:
  schedulepro-network:
    driver: bridge
    name: schedulepro-network

# ================================================
# VOLUMES (Persistent Data)
# ================================================
volumes:
  postgres_data:
    driver: local
    name: schedulepro-postgres-data
  backend_uploads:
    driver: local
    name: schedulepro-uploads
  redis_data:
    driver: local
    name: schedulepro-redis-data
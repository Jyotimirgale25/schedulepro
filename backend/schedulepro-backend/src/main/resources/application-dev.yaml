spring:
  application:
    name: schedulepro-backend

  # ============================================
  # DATABASE
  # ============================================
  datasource:
    url: ${DB_URL:postgresql://schedulepro:VGpccT5oTNxbmvIiZUZ7ube3SKOgRhz2@dpg-d9hmnhupbkes73acr370-a.oregon-postgres.render.com/schedulepro_db}
    username: ${DB_USERNAME:schedulepro}
    password: ${DB_PASSWORD:VGpccT5oTNxbmvIiZUZ7ube3SKOgRhz2}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: ScheduleProHikariPool

  # ============================================
  # JPA
  # ============================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
          lob:
            non_contextual_creation: true
    open-in-view: false

  # ============================================
  # JACKSON
  # ============================================
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  # ============================================
  # EMAIL - USING ENVIRONMENT VARIABLES
  # ============================================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
    default-encoding: UTF-8

  # ============================================
  # SECURITY - OAUTH2
  # ============================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google

  # ============================================
  # FILE UPLOAD
  # ============================================
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  # ============================================
  # FLYWAY (Disabled)
  # ============================================
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ============================================
  # SPRING INTERNAL
  # ============================================
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

# ============================================
# JWT
# ============================================
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================
# CORS
# ============================================
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:3000,http://frontend,https://schedulepro-2.onrender.com,https://schedulepro-frontend.onrender.com}

# ============================================
# LOGGING
# ============================================
logging:
  level:
    com.schedulepro: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

# ============================================
# ACTUATOR
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# ============================================
# SWAGGER
# ============================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tryItOutEnabled: true

# ============================================
# APP CONFIG
# ============================================
app:
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}
  base-url: ${BASE_URL:http://localhost:8080,https://schedulepro-1.onrender.com}
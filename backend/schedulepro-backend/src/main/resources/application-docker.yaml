
spring:
  # ==========================================
  # DATABASE - Connect to Docker PostgreSQL
  # ==========================================
  datasource:
    url: ${DB_URL:postgresql://schedulepro:VGpccT5oTNxbmvIiZUZ7ube3SKOgRhz2@dpg-d9hmnhupbkes73acr370-a.oregon-postgres.render.com/schedulepro_db}
    username: ${DB_USERNAME:schedulepro}
    password: ${DB_PASSWORD:VGpccT5oTNxbmvIiZUZ7ube3SKOgRhz2}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # ==========================================
  # JPA - Optimized for Docker
  # ==========================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20

  # ==========================================
  # EMAIL - Use Mailtrap in Docker
  # ==========================================
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

  # ==========================================
  # SECURITY - OAUTH2 (HARDCODED)
  # ==========================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
# ============================================
# JWT - Docker-specific
# ============================================
jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================
# CORS - Allow Docker frontend
# ============================================
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:3000,http://frontend,https://schedulepro-2.onrender.com,https://schedulepro-frontend.onrender.com,https://schedulepro-1.onrender.com}

# ============================================
# LOGGING - Less verbose for Docker
# ============================================
logging:
  level:
    com.schedulepro: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO

# ============================================
# APP - Docker-specific settings
# ============================================
app:
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}
  base-url: ${BASE_URL:http://localhost:8080,https://schedulepro-1.onrender.com}
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  application:
    name: schedulepro-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ScheduleProDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: ScheduleProHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          lob:
            non_contextual_creation: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com


  # ==========================================
  # SECURITY - OAUTH2 (HARDCODED)
  # ==========================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

jwt:
  secret: ${JWT_SECRET:}
  expiration: 86400000
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:3000,http://frontend}

logging:
  level:
    com.schedulepro: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.mail: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tryItOutEnabled: true
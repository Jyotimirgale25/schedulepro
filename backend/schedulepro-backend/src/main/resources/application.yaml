spring:
  application:
    name: schedulepro-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/ScheduleProDB}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:project123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      pool-name: ScheduleProHikariPool

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
          lob:
            non_contextual_creation: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC
    default-property-inclusion: non_null

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:sweetdemo93@gmail.com}
    password: ${MAIL_PASSWORD:qwemkuwehmqjgfls}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com
    default-encoding: UTF-8

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:157330384875-cjedpfpffmnb0nisf5l6d8809sg31hlm.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:scheduleProSecretKey2024MustBe32CharsLongAndSecure!!!}
  expiration: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== CORS =====
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

# ===== LOGGING =====
logging:
  level:
    com.schedulepro: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.mail: DEBUG

# ===== ACTUATOR =====
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

# ===== SWAGGER =====
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tryItOutEnabled: true
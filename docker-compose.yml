services:
  postgres:
    image: postgres:14-alpine
    container_name: schedulepro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ScheduleProDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: project123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schedulepro-backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - schedulepro-network

  backend:
    image: jyotimirgale/schedulepro-backend:latest
    container_name: schedulepro-backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - schedulepro-network

  frontend:
    image: jyotimirgale/schedulepro-frontend:latest
    container_name: schedulepro-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: http://localhost/api
      REACT_APP_WS_URL: ws://localhost/ws
    networks:
      - schedulepro-network

networks:
  schedulepro-network:
    driver: bridge
    name: schedulepro-network

volumes:
  postgres_data:
    driver: local
    name: schedulepro-postgres-data
  backend_uploads:
    driver: local
    name: schedulepro-uploads